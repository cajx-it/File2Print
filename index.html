<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pro Upload | Compact Dark</title>

</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Transfer Portal</h1>
                <p>Upload files securely.</p>
            </div>

            <form id="uploadForm">
                <div class="form-group">
                    <label>Internal Name</label>
                    <input type="text" id="name" placeholder="User Name" required>
                </div>

                <div class="form-group">
                    <label>Attachments</label>
                    <!-- Smaller Compact Drop Zone -->
                    <div class="drop-zone" id="dropZone">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        <p><strong>Add Files</strong> or drag here</p>
                        <input type="file" id="fileInput" multiple>
                    </div>

                    <!-- Minimized List: Shows 2 items only before scrolling -->
                    <div class="file-list" id="fileList"></div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <div class="loader" id="loader"></div>
                    <span id="btnText">Upload to Server</span>
                </button>
            </form>

            <div id="status" class="status-area"></div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
